name: CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.3
        run: |
          curl -sLO "https://download.swift.org/swift-6.3-release/xcode/swift-6.3-RELEASE/swift-6.3-RELEASE-osx.pkg"
          sudo installer -pkg swift-6.3-RELEASE-osx.pkg -target /
          export TOOLCHAINS=swift
          echo "TOOLCHAINS=swift" >> $GITHUB_ENV
          xcrun --toolchain swift swift --version
      - name: Build
        run: xcrun --toolchain swift swift build -v
      - name: Test
        run: xcrun --toolchain swift swift test -v

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.3
        run: |
          curl -sLO https://download.swift.org/swift-6.3-release/windows10/swift-6.3-RELEASE/swift-6.3-RELEASE-windows10.exe
          Start-Process -Wait -FilePath .\swift-6.3-RELEASE-windows10.exe -ArgumentList '/install', '/quiet', '/norestart'
          # Add Swift to PATH
          $swiftPath = "C:\Program Files\Swift\Toolchains\6.3.0+Asserts\usr\bin"
          $sdkPath = "C:\Program Files\Swift\Platforms\6.3.0\Windows.platform\Developer\SDKs\Windows.sdk"
          echo "$swiftPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "SDKROOT=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
