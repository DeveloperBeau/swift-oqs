name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
          - name: Linux
            runner: ubuntu-24.04
          - name: Windows
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeveloperBeau/setup-swift@v1
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  android:
    name: Android
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: skiptools/swift-android-action@v2
        with:
          swift-version: '6.3'
          run-tests: true
          free-disk-space: true
