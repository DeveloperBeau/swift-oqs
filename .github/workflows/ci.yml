name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.3 via swiftly
        run: |
          curl -O "https://download.swift.org/swiftly/darwin/swiftly-x86_64.pkg" 2>/dev/null || true
          # Use swiftly from homebrew if available
          brew install swiftly || true
          swiftly install 6.3 || true
          swiftly use 6.3 || true
          swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
